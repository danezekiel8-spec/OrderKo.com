services:
  - type: web
    name: orderko-web
    runtime: node
    plan: free
    region: singapore
    branch: main
    autoDeploy: true
    buildCommand: npm ci && npm run build:render
    startCommand: npm run start:render
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20.11.1
      - key: DATABASE_URL
        fromDatabase:
          name: orderko-postgres
          property: connectionString
      - key: STAFF_SESSION_SECRET
        generateValue: true
      - key: STAFF_PIN_SECRET
        generateValue: true
      - key: ORDERKO_SUPER_ADMIN_SECRET
        generateValue: true
      - key: ORDERKO_DEFAULT_RESTAURANT_SLUG
        sync: false
      - key: ORDERKO_QR_BASE_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: LEAD_NOTIFICATION_EMAIL
        sync: false
      - key: LEAD_EMAIL_FROM
        sync: false

databases:
  - name: orderko-postgres
    databaseName: orderko
    user: orderko
    plan: free
    postgresMajorVersion: "15"
    ipAllowList: []
