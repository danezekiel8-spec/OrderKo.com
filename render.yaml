services:
  - type: web
    name: orderko-web
    runtime: node
    plan: free
    region: singapore
    branch: main
    autoDeploy: true
    buildCommand: npm ci && npm run env:check:production && npm run db:generate:postgres && npm run build
    startCommand: npm run db:deploy:postgres && npm run db:bootstrap:g-cafe && npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20.11.1
      - key: DATABASE_URL
        fromDatabase:
          name: orderko-postgres
          property: connectionString
      - key: STAFF_SESSION_SECRET
        generateValue: true
      - key: ADMIN_PIN
        sync: false
      - key: CASHIER_PIN
        sync: false
      - key: KITCHEN_PIN
        sync: false
      - key: ORDERKO_QR_BASE_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

databases:
  - name: orderko-postgres
    databaseName: orderko
    user: orderko
    plan: free
    postgresMajorVersion: "15"
    ipAllowList: []
